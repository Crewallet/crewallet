<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crewallet Support</title>
  <style>
    body {
      margin: 0;
      background: #f6f7fb;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }

    .card {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(17,24,39,0.08);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(15,23,42,0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 40px;
      letter-spacing: -0.04em;
    }

    p {
      color: #4b5563;
      font-size: 16px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }

    .back {
      display: inline-block;
      margin-bottom: 18px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← Back to Crewallet</a>

    <div class="card">
      <h1>Support</h1>
      <p>
        If you need help with Crewallet, contact:
      </p>

      <p>
        <a href="mailto:davideprofeta@gmail.com">crewalletsupport@gmail.com</a>
      </p>

      <p>
        Include your device model, iOS version, and a short description of the issue.
      </p>
    </div>
  </div>
</body>
</html>
