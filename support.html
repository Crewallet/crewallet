<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crewallet Support</title>
  <meta
    name="description"
    content="Support page for Crewallet."
  />
  <style>
    :root {
      --bg: #f5f8fb;
      --surface: #ffffff;
      --text: #111827;
      --muted: #5b6472;
      --border: #dbe4ee;
      --accent: #1f6feb;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 20px;
      --max: 760px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f7fbff 0%, #f3f6fb 100%);
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .top-link {
      display: inline-block;
      margin: 28px 0 8px;
      font-weight: 700;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 32px;
      margin: 18px 0 40px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 2.8rem);
      letter-spacing: -0.05em;
    }

    p,
    li {
      color: var(--muted);
    }

    ul {
      padding-left: 20px;
    }

    .email {
      font-size: 1.05rem;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .card {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="top-link" href="index.html">← Back to Crewallet</a>

    <article class="card">
      <h1>Support</h1>
      <p>
        If you need help with Crewallet, contact:
      </p>

      <p class="email">
        <a href="mailto:crewalletsupport@gmail.com">crewalletsupport@gmail.com</a>
      </p>

      <p>
        To help us answer faster, include:
      </p>

      <ul>
        <li>Your device model</li>
        <li>Your iOS version</li>
        <li>Your app version</li>
        <li>A short description of the issue</li>
      </ul>
    </article>
  </div>
</body>
</html>
